    <script>
        var adventureJson = {"AdventureBasicInfo":{"id":404014,"adventureGuid":"32d1fdb3-7bac-4b8b-ba61-2418dee3de60","visibility":"Public","deeplink":"https://labs.geocaching.com/goto/67806096-2e82-4288-8af1-d995d3588268","customAccessCode":"67806096-2e82-4288-8af1-d995d3588268","isArchived":false,"isTest":false,"ownerPublicGuid":"d1606884-030f-42be-8d9f-4705dc8a78e5","ownerId":28028,"ownerGeoAccountId":880140,"ownerUsername":"1gowild","ratingsAverage":4.5,"ratingsTotalCount":11,"createdUtc":"2025-11-20T09:17:23.274-08:00","publishedUtc":"2025-11-20T10:22:13.187-08:00","lastUpdateDateTimeUtc":"2025-11-20T10:22:13.187-08:00","firebaseDynamicLink":"https://labs.geocaching.com/goto/67806096-2e82-4288-8af1-d995d3588268","medianTimeToComplete":92,"title":"The Wonderful World of Wetherspoons in Portsmouth","description":"This AL celebrates the variety of Wetherspoons carpets.\n\nYou DO NOT need to visit the headline location of this AL unless you want to enjoy the hospitality at the Isambard Kingdom Brunel in Guildhall Square.\n\nWetherspoons carpets are a distinctive feature found in the chain of pubs across the UK, often sparking curiosity and debate among patrons. These carpets typically feature bold, intricate patterns and bright colours, sometimes blending floral motifs or, geometric designs. They are known for being rather eye-catching and quirky, often combining a somewhat vintage aesthetic with a touch of the eccentric.","location":{"latitude":50.797033333333331,"longitude":-1.0926166666666666},"keyImageUrl":"https://gsmediadata.blob.core.windows.net/mediacontainer/c6165a4c-049a-4a20-9650-6e95113bdf76","stages":[{"id":"57caf87a-bac7-4db9-b288-c4deaf007d4d","title":"The Lord Palmerston, Southsea","description":"The design of Wetherspoons carpets can be surprisingly varied from one pub to another, with each location often sporting its own unique pattern, contributing to the feeling of a local, personalized establishment. Despite their vivid patterns, these carpets have become almost synonymous with the brand, with many regulars associating the distinctive designs with the cozy, no-frills environment that Wetherspoons pubs are known for. There’s even a sense of humor in some of the designs, with patterns that might seem random or unusual, adding to the charm of the space.\n\nSome patrons even take to social media to share their love—or bemusement—of the carpets, leading to a sort of cult following for these often-overlooked details in the pub experience.\n\nPub history\n\nPalmerston Road has been Southsea’s main shopping street since its Victorian development. Thomas Ellis Owen was responsible for much of the planning and design of 19th-century Southsea. He is commemorated by Owens public house, originally named The Palmerston. Viscount (Lord) Palmerston served more than nine years as Prime Minister and died in office in 1865. He also had a series of forts built to protect Portsmouth harbour and its dockyard, now called ‘Palmerston’s Folly’.","location":{"latitude":50.7842,"longitude":-1.089},"keyImage":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/a996b4f2-faa8-47db-93f9-07945741f397"},"geofencingRadius":50.0,"challengeType":"MultiChoice","questionToAnswer":{"question":"What are Palmerston's forts built in the Solent often referred to as?","answers":[],"multiChoiceOptions":[{"text":"Palmerston's Folly","isCorrect":true,"order":0},{"text":"Palmerston's Forts","isCorrect":false,"order":1},{"text":"Palmerston's Achievement","isCorrect":false,"order":2},{"text":"Palmerston's Legacy","isCorrect":false,"order":3}]},"isFinal":false,"unlockingStages":[],"journal":{"image":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/066a2c0e-fb94-41d4-8beb-ba2f3c0d2db7"},"message":"Correct! You know your Wetherspoon's and your history."}},{"id":"272bdb8f-d928-4327-b912-a4b4684876cd","title":"The John Jacques, Fratton","description":"The design of Wetherspoons carpets can be surprisingly varied from one pub to another, with each location often sporting its own unique pattern, contributing to the feeling of a local, personalized establishment. Despite their vivid patterns, these carpets have become almost synonymous with the brand, with many regulars associating the distinctive designs with the cozy, no-frills environment that Wetherspoons pubs are known for. There’s even a sense of humor in some of the designs, with patterns that might seem random or unusual, adding to the charm of the space.\n\nSome patrons even take to social media to share their love—or bemusement—of the carpets, leading to a sort of cult following for these often-overlooked details in the pub experience.\n\nPub history\n\nPreviously a branch of the Portsea Island Mutual Co-operative Society (PIMCO), the name of this pub recalls PIMCO’s former chief executive who died in 1995 aged 90. PIMCO was set up by a handful of volunteers in May 1873 – the first Fratton Road shop opening in 1887. It was the first of many PIMCO premises in Fratton Road, including this site. From the end of World War II, PIMCO’s driving force for 20 years was its chief executive John Jacques, later Lord Jacques of Portsea Island.","location":{"latitude":50.798333333333332,"longitude":-1.07675},"keyImage":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/001398dd-040c-44c9-8bbb-b5054dc2dae2"},"geofencingRadius":20.0,"challengeType":"MultiChoice","questionToAnswer":{"question":"At what age did John Jacques die?","answers":[],"multiChoiceOptions":[{"text":"25","isCorrect":false,"order":0},{"text":"90","isCorrect":true,"order":1},{"text":"50","isCorrect":false,"order":2},{"text":"75","isCorrect":false,"order":3}]},"isFinal":false,"unlockingStages":[],"journal":{"image":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/4ce6d309-aad5-4919-a875-a1c6d8b29130"},"message":"Correct! You know your Wetherspoon's and your history."}},{"id":"9fbfd655-3ffb-4629-ad73-600b8243f41b","title":"The Sir John Baker, North End","description":"The design of Wetherspoons carpets can be surprisingly varied from one pub to another, with each location often sporting its own unique pattern, contributing to the feeling of a local, personalized establishment. Despite their vivid patterns, these carpets have become almost synonymous with the brand, with many regulars associating the distinctive designs with the cozy, no-frills environment that Wetherspoons pubs are known for. There’s even a sense of humor in some of the designs, with patterns that might seem random or unusual, adding to the charm of the space.\n\nSome patrons even take to social media to share their love—or bemusement—of the carpets, leading to a sort of cult following for these often-overlooked details in the pub experience.\n\nPub history\n\nThis pub is named after Sir John Baker who lived in North End House, close to this Wetherspoon pub. Sir John Baker, Lord Mayor of the Borough (1870 and 1875), was known as Honest John. He was a local MP, justice of the peace and chairman of the school board. Sir John was also the owner of several shops.","location":{"latitude":50.815383333333337,"longitude":-1.07955},"keyImage":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/d53fa87a-6465-4ee7-b2b9-86738bb3b468"},"geofencingRadius":30.0,"challengeType":"MultiChoice","questionToAnswer":{"question":"What was John Baker known as?","answers":[],"multiChoiceOptions":[{"text":"Sneaky John","isCorrect":false,"order":0},{"text":"Big John","isCorrect":false,"order":1},{"text":"Honest John","isCorrect":true,"order":2},{"text":"John Boy","isCorrect":false,"order":3}]},"isFinal":false,"unlockingStages":[],"journal":{"image":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/3ac7bfff-8bb2-4d30-b924-d8066dca932b"},"message":"Correct! You know your Wetherspoon's and your history."}},{"id":"b53e095a-210e-4766-8bf8-ca6968cea31d","title":"The First Post, Cosham","description":"The design of Wetherspoons carpets can be surprisingly varied from one pub to another, with each location often sporting its own unique pattern, contributing to the feeling of a local, personalized establishment. Despite their vivid patterns, these carpets have become almost synonymous with the brand, with many regulars associating the distinctive designs with the cozy, no-frills environment that Wetherspoons pubs are known for. There’s even a sense of humor in some of the designs, with patterns that might seem random or unusual, adding to the charm of the space.\n\nSome patrons even take to social media to share their love—or bemusement—of the carpets, leading to a sort of cult following for these often-overlooked details in the pub experience.\n\nPub history\n\nThis former bookseller and stationer’s store partially covers the site of two earlier buildings. On the left side (as you face the pub) was Curtis, the corn merchant, a three-storey property which dominated High Street until was it demolished in the 1960s. Baker and Sons chemist’s shop was on the right-hand side. Established by Thomas Baker, in the 1840s, it was also the town’s first post office. Baker was the postmaster until the 1890s.","location":{"latitude":50.844683333333336,"longitude":-1.0672833333333334},"keyImage":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/49531daa-80d0-4959-ade1-5b8a105f5acb"},"geofencingRadius":30.0,"challengeType":"MultiChoice","questionToAnswer":{"question":"Thomas Baker owned the premises in the 1800s. What type of shop was it?","answers":[],"multiChoiceOptions":[{"text":"Bakers","isCorrect":false,"order":0},{"text":"Phone Repairs","isCorrect":false,"order":1},{"text":"Bookmakers","isCorrect":false,"order":2},{"text":"Chemist and Post Office","isCorrect":true,"order":3}]},"isFinal":false,"unlockingStages":[],"journal":{"image":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/a6ba6707-9eea-4089-9d04-dd60832fa48e"},"message":"Correct! You know your Wetherspoon's and your history."}},{"id":"afb47b3e-d69c-4e29-8cec-1d36263665a6","title":"The Sir Alec Rose, Port Solent","description":"The design of Wetherspoons carpets can be surprisingly varied from one pub to another, with each location often sporting its own unique pattern, contributing to the feeling of a local, personalized establishment. Despite their vivid patterns, these carpets have become almost synonymous with the brand, with many regulars associating the distinctive designs with the cozy, no-frills environment that Wetherspoons pubs are known for. There’s even a sense of humor in some of the designs, with patterns that might seem random or unusual, adding to the charm of the space.\n\nSome patrons even take to social media to share their love—or bemusement—of the carpets, leading to a sort of cult following for these often-overlooked details in the pub experience.\n\nPub history\n\nPort Solent is the country’s third largest marina, formed on reclaimed land and opened by Sir Alec Rose, whose Lively Lady was the first vessel to enter the new complex. He was the Portsmouth greengrocer who was knighted by Queen Elizabeth II in 1968, after he sailed into Portsmouth Harbour having completed a 354-day, 28,500-mile, solo trip around the globe. Sir Alec, who was also given the freedom of Portsmouth, died in 1991, at 82.","location":{"latitude":50.840966666666667,"longitude":-1.0975833333333334},"keyImage":{"id":0,"url":"https://gsmediadata.blob.core.windows.net/mediacontainer/638c49f9-9af3-4b4c-b2c1-d2312053b287"},"geofencingRadius":100.0,"challengeType":"MultiChoice","questionToAnswer":{"question":"What was the name of the vessel Sir Alec Rose circumnavigated the globe in?","answers":[],"multiChoiceOptions":[{"text":"Lively Lady","isCorrect":true,"order":0},{"text":"Lively Boy","isCorrect":false,"order":1},{"text":"Lively Girl","isCorrect":false,"order":2},{"text":"Lively Man","isCorrect":false,"order":3}]},"isFinal":false,"unlockingStages":[],"jou
